# Scénario : Le Mystère du Capitaine Verdier
# Format YAML auteur → converti en JSON firmware par tools/yaml2json.py
# NE PAS éditer le .json directement : c'est un artefact généré.

meta:
  id: capitaine_verdier
  title: Le Mystère du Capitaine Verdier
  version: '1.1'
  duration_min: 20
  players: 2-4
steps:
- id: intro
  type: narrative
  do:
  - audio:
      play: intro_ambient
  - screen_main:
      text: |-
        1957.

        Le sous-marin VERDIER
        disparait en mer du
        Nord avec 42 hommes.

        Sa balise de detresse
        vient de s'activer.

        Vous avez 20 minutes.
  - led:
      target: all
      color: '#001F4D'
      mode: pulse
  next: intro2
- id: intro2
  type: narrative
  do:
  - screen_main:
      text: |-
        MISSION

        Trois enigmes gardent
        les secrets du bord.

        ETAPE 1/3
        Posez le medaillon
        Verdier sur la zone
        NFC de la box
        pour vous identifier.
  next: attente_medallion
- id: attente_medallion
  type: trigger
  on: rfid_read
  expect:
    uid: 04:VE:RD:01
  timeout_sec: 300
  hints:
  - delay_sec: 30
    do:
    - screen_secondary:
        text: |-
          Le medaillon Verdier
          est un disque laiton
          grave aux armes
          du capitaine.
  - delay_sec: 90
    do:
    - screen_secondary:
        text: |-
          Le medaillon est
          dans l'enveloppe
          camel ci-jointe.
    - audio:
        play: hint_medallion
  do:
  - audio:
      play: activation
  - led:
      target: all
      color: '#00AA88'
      mode: solid
  - screen_main:
      text: |-
        IDENTITE VERIFIEE

        ENIGME 1 / 3
        LA BOUSSOLE

        Le VERDIER naviguait
        vers un cap secret.
        Tournez la molette
        jusqu'a la bonne
        direction.
  next: cap_boussole
- id: cap_boussole
  type: input
  on: rotary_value
  expect:
    value: 270
    tolerance: 10
  timeout_sec: 120
  hints:
  - delay_sec: 30
    do:
    - screen_secondary:
        text: |-
          Le dernier message
          radio parlait d'un
          cap vers l'Ouest.
  - delay_sec: 70
    do:
    - screen_secondary:
        text: |-
          Cap Ouest = 270
          degres sur la rose
          des vents.
    - audio:
        play: hint_compass
  do_success:
  - audio:
      play: correct
  - led:
      target: all
      color: '#00FF88'
      mode: flash
  - screen_main:
      text: |-
        CAP 270 VALIDE !

        ENIGME 2 / 3
        LE CODE SECRET

        Le carnet de bord
        du capitaine contient
        un code. Consultez-le
        et entrez-le sur
        le clavier numerique.
  do_fail:
  - audio:
      play: wrong
  - screen_secondary:
      text: |-
        Mauvais cap.
        Cherchez la direction
        de l'Ouest.
  - incr_var:
      compass_fails: 1
  next: check_compass
- id: check_compass
  type: branch
  conditions:
  - var: compass_fails
    op: gte
    value: 5
    next: hint_compass_force
  default: code_secret
- id: hint_compass_force
  type: narrative
  do:
  - screen_secondary:
      text: |-
        AIDE : le cap est
        270 degres
        (plein Ouest).
  - audio:
      play: hint_compass_final
  - set_var:
      compass_fails: 0
  next: cap_boussole
- id: code_secret
  type: input
  on: keypad_code
  expect:
    code: '7394'
  timeout_sec: 180
  hints:
  - delay_sec: 45
    do:
    - screen_secondary:
        text: |-
          Le code est cache
          dans le carnet.
          Trouvez la date du
          naufrage... inversee.
  - delay_sec: 100
    do:
    - screen_secondary:
        text: |-
          Date du naufrage :
          4 9 3 7
          Inversee : 7 3 9 4
    - audio:
        play: hint_code
  do_success:
  - audio:
      play: correct
  - led:
      target: all
      color: '#0066FF'
      mode: pulse
  - screen_main:
      text: |-
        CODE 7394 ACCEPTE !

        ENIGME 3 / 3
        L'INCLINAISON

        Le compartiment de
        secours ne s'ouvre
        qu'a 15 degres
        d'inclinaison. Penchez
        la box vers l'avant.
  do_fail:
  - audio:
      play: wrong
  - screen_secondary:
      text: |-
        Code incorrect.
        Consultez a nouveau
        le carnet de bord.
  - incr_var:
      code_fails: 1
  next: check_code
- id: check_code
  type: branch
  conditions:
  - var: code_fails
    op: gte
    value: 3
    next: hint_code_force
  default: inclinaison
- id: hint_code_force
  type: narrative
  do:
  - screen_secondary:
      text: |-
        AIDE : le code est
        7 3 9 4
  - audio:
      play: hint_code_final
  - set_var:
      code_fails: 0
  next: code_secret
- id: inclinaison
  type: input
  on: accel_tilt
  expect:
    angle: 15
    tolerance: 3
  timeout_sec: 120
  hints:
  - delay_sec: 25
    do:
    - screen_secondary:
        text: |-
          Inclinez la box
          vers l'avant d'environ
          15 degres.
  - delay_sec: 65
    do:
    - screen_secondary:
        text: |-
          15 degres exactement.
          Tenez la position
          quelques secondes.
    - audio:
        play: hint_tilt
  do_success:
  - audio:
      play: victoire
  - flash:
      color: '#FFD700'
      count: 5
  - led:
      target: all
      color: '#FFD700'
      mode: cycle
  - screen_main:
      text: |-
        ACCES AUTORISE !

        Le compartiment
        secret du VERDIER
        s'est ouvert.

        Vous avez resolu
        le mystere du
        Capitaine Verdier !
  do_fail:
  - screen_secondary:
      text: |-
        Cette inclinaison
        n'est pas la bonne.
        Essayez encore.
  next: epilogue
- id: epilogue
  type: narrative
  do:
  - screen_main:
      text: |-
        MISSION ACCOMPLIE

        Dans le compartiment
        vous trouvez le
        dernier journal chiffre
        du capitaine.

        L'histoire du VERDIER
        peut enfin etre
        revele au monde.
  - led:
      target: all
      color: '#FFD700'
      mode: cycle
  next: end
- id: end
  type: end
  do:
  - screen_main:
      text: |-
        BRAVO !

        Merci d'avoir joue
        a EscapeBox.

        Votre temps a ete
        enregistre.
  - led:
      target: all
      color: '#001F4D'
      mode: pulse
